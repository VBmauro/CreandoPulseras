        <img src="https://i.postimg.cc/Z5T3mcHk/Bio.png" alt="Presentación CreandoPulseras">

    <main>
        <div class="collection-title-container">
            <h2>Nuestra Colección</h2>

    <div id="zoom-modal" class="zoom-modal hidden" onclick="closeZoom()">
        <span class="close-zoom">&times;</span>

    </div>

            <span class="close-btn" onclick="closeContact()" style="color:#333; float:right;">&times;</span>
            <h3 style="color:#d4af37; text-transform:uppercase;">Contacto</h3>

                <a href="https://wa.me/529813493773" target="_blank" style="color:#25d366; text-decoration:none; font-weight:bold;">981 349 3773</a>
