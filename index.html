<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">CreandoPulseras</div>
        <div class="cart-icon" onclick="toggleCart()">
            🛒 Carrito (<span id="cart-count">0</span>)
        </div>
    </header>

    <section class="hero">
        <img src="https://i.postimg.cc/tTS58cWp/herobanner.png" alt="Presentación CreandoPulseras">
    </section>

    <main>
        <h2>Nuestras Colecciones</h2>
        <div class="products-grid" id="products-container">
            </div>
    </main>

    <div id="cart-modal" class="cart-modal hidden">
        <div class="cart-content">
            <span class="close-btn" onclick="toggleCart()">&times;</span>
            <h3>Tu Carrito</h3>
            <div id="cart-items"></div>
            
            <div class="cart-summary">
                <p>Subtotal: $<span id="subtotal-price">0.00</span></p>
                <p>Envío (MEXPOST): $50.00</p>
                <h3 class="cart-total">Total: $<span id="total-price">0.00</span></h3>
            </div>

            <div class="customer-info">
                <h4>Datos de Envío</h4>
                <input type="text" id="customer-name" placeholder="Nombre completo" required>
                <input type="tel" id="customer-phone" placeholder="Teléfono" required>
                <input type="text" id="customer-cp" placeholder="Código Postal (C.P.)" required>
                <textarea id="customer-address" placeholder="Calle, Número, Colonia, Ciudad y Estado" required></textarea>
            </div>

            <button class="checkout-btn" onclick="checkout()">Proceder al Pago</button>
        </div>
    </div>

    <div id="zoom-modal" class="zoom-modal hidden" onclick="closeZoom()">
        <span class="close-zoom">&times;</span>
        <img id="zoomed-img" src="" alt="Detalle del producto">
    </div>

    <script src="app.js"></script>
</body>

</html>
