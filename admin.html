<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administración - CreandoPulseras</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-body">
    <div class="admin-container">
        <h2>Panel de Control - Subir Producto</h2>
        <form id="product-form">
            <label>SKU del Producto:</label>
            <input type="text" id="sku" placeholder="Ej: PLS-001" required>

            <label>https://postimg.cc/CBzHRQwP:</label>
            <input type="url" id="image-url" required>

            <label>Descripción:</label>
            <textarea id="description" placeholder="Materiales, detalles visuales..." required></textarea>

            <label>Medidas (cm):</label>
            <input type="text" id="measurements" placeholder="Ej: 18cm ajustable" required>

            <label>Stock Disponible:</label>
            <input type="number" id="stock" required>

            <label>Precio ($):</label>
            <input type="number" id="price" required>

            <button type="submit" class="admin-btn">Guardar Producto</button>
        </form>
    </div>
</body>

</html>
