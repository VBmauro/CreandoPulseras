<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administración - CreandoPulseras</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background:#f4f4f4; padding:50px;">
    <div style="max-width:500px; margin:0 auto; background:white; padding:30px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.1);">
        <h2 style="text-align:center; color:#d4af37; text-transform:uppercase; letter-spacing:1px;">Nuevo Producto</h2>
        <form id="product-form">
            <label>SKU:</label><input type="text" id="sku" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px;" required>
            <label>URL Imagen:</label><input type="url" id="image-url" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px;" required>
            <label>Descripción:</label><textarea id="description" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px;" required></textarea>
            <label>Medidas:</label><input type="text" id="measurements" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px;" required>
            <label>Stock:</label><input type="number" id="stock" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px;" required>
            <label>Precio:</label><input type="number" id="price" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px;" required>
            <button type="submit" style="width:100%; padding:15px; background:#333; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold; margin-top:10px;">Guardar Producto</button>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
